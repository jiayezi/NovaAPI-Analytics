# 数据库配置
database:
  mysql:
    host: "localhost"
    port: 3306
    user: "root"
    password: "YOUR_PASSWORD" # 请在 .env 文件中配置此项，不要提交真实密码到 GitHub
    database: "nova_api_oltp"
  duckdb:
    path: "data/nova_analytics.db"

# 模拟业务模型与定价 (每 1M Token 的 USD 价格)
ai_models:
  - model_id: "gpt-5.4"
    provider: "OpenAI"
    input_price_per_1M: 2.50
    output_price_per_1M: 15.00
    max_context: 1050000
